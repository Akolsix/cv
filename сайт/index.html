    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cайт визитка</title>
    <style>
        /* Общие стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        /* Шапка */
        header {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            text-align: center;
            padding: 3rem 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header-content {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        /* Основное содержимое */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        
        section {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            padding: 2.5rem;
            margin-bottom: 2rem;
        }
        
        h2 {
            color: #2563eb;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e5e7eb;
            font-size: 1.8rem;
        }
        
        /* О себе */
        .about {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .about img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 5px solid #2563eb;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .about p {
            margin-bottom: 1rem;
            max-width: 700px;
        }
        
        /* Услуги */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .service {
            background: #f8fafc;
            padding: 1.8rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            border-left: 4px solid #2563eb;
        }
        
        .service:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .service h3 {
            color: #2563eb;
            margin-bottom: 0.8rem;
            font-size: 1.3rem;
        }
        
        /* Контакты */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .contact-item i {
            color: #2563eb;
            font-size: 1.2rem;
        }
        
        .contact-info a {
            color: #2563eb;
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        .contact-info a:hover {
            color: #1e40af;
            text-decoration: underline;
        }
        
        /* Подвал */
        footer {
            text-align: center;
            padding: 2rem;
            background: #1e293b;
            color: white;
            margin-top: 3rem;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        
        .social-links a {
            color: white;
            font-size: 1.5rem;
            transition: all 0.2s;
        }
        
        .social-links a:hover {
            color: #93c5fd;
            transform: translateY(-2px);
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2rem;
            }
            
            header p {
                font-size: 1rem;
            }
            
            section {
                padding: 1.8rem;
            }
            
            .services-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Олег Александрович</h1>
            <p></p>
        </div>
    </header>
    
    <div class="container">
        <section class="about">
            <h2>Обо мне</h2>

            </div>
        </section>
    </div>
    
    <footer>
